    <!-- Primary Meta Tags -->

    <!-- Twitter -->

    <meta name="theme-color" content="#0F4C81" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Insert Solution",
      "url": "https://insertsolution.com",
      "logo": "https://insertsolution.com/logo.png",
      "description": "Leading provider of enterprise healthcare and business technology solutions",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Business Avenue",
        "addressLocality": "New York",
        "addressRegion": "NY",
        "postalCode": "10001",
        "addressCountry": "US"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-555-123-4567",
        "contactType": "Customer Service",
        "email": "info@insertsolution.com",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://facebook.com/insertsolution",
        "https://twitter.com/insertsolution",

        "https://instagram.com/insertsolution"
      ],

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Insert Solution",
      "url": "https://insertsolution.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://insertsolution.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <script type="application/ld+json">

      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "500"
      }
    }
    </script>

    <div id="root"></div>
